<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>กำลังเปิดหน้าต่อไป</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            font-family: Arial, sans-serif;
            background:
                radial-gradient(circle at top, #1b1b1b 0%, #0d0d0d 45%, #050505 100%);
            color: #ffffff;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 460px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 24px;
            padding: 30px 24px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.40);
        }

        .status {
            display: inline-block;
            padding: 7px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: bold;
            background: rgba(25, 195, 125, 0.14);
            color: #7df0bc;
            margin-bottom: 16px;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 28px;
            line-height: 1.3;
        }

        p {
            margin: 0 0 18px;
            font-size: 15px;
            line-height: 1.65;
            color: rgba(255, 255, 255, 0.82);
        }

        .loader-wrap {
            margin: 22px auto 16px;
        }

        .loader-wrap img {
            width: 180px;
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto 16px;
        }

        .progress {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(90deg, #19c37d 0%, #67e8a5 100%);
            animation: fillBar 3s linear forwards;
        }

        @keyframes fillBar {
            from { width: 0%; }
            to { width: 100%; }
        }

        .countdown {
            margin-top: 14px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.72);
        }

        .actions {
            margin-top: 22px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 15px 20px;
            border-radius: 999px;
            background: #ffffff;
            color: #101010;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
            opacity: 0.95;
        }

        .note {
            margin-top: 14px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.56);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="status">PROCESSING</div>
        <h1>กำลังเปิดหน้าต่อไป</h1>
        <p>กรุณารอสักครู่ ระบบกำลังพาคุณไปยังปลายทางโดยอัตโนมัติ</p>

        <div class="loader-wrap">
            <img src="loading.gif" alt="Loading" />
            <div class="progress">
                <div class="progress-bar"></div>
            </div>
        </div>

        <div class="countdown">
            จะเปิดอัตโนมัติใน <span id="timer">3</span> วินาที
        </div>

        <div class="actions">
            <a class="btn" id="manualLink" href="https://yellowx888.com/register?openExternalBrowser=1">
                เปิดทันที
            </a>
        </div>

        <div class="note">
            หากระบบไม่เปิดอัตโนมัติ สามารถกดปุ่มด้านบนได้ทันที
        </div>
    </div>

    <script>
        (function () {
            const targetUrl = "https://yellowx888.com/register?openExternalBrowser=1";
            const timerEl = document.getElementById("timer");
            let seconds = 3;

            const countdown = setInterval(() => {
                seconds -= 1;

                if (seconds >= 0) {
                    timerEl.textContent = String(seconds);
                }

                if (seconds <= 0) {
                    clearInterval(countdown);
                    window.location.href = targetUrl;
                }
            }, 1000);
        })();
    </script>
</body>
</html>
